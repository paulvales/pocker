services:
  pocker:
    image: ${APP_IMAGE:-pocker}:${APP_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-pocker}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-}
      APP_BUILD: ${APP_BUILD:-}
      YOUTRACK_BASE_URL: ${YOUTRACK_BASE_URL:-}
      YOUTRACK_TOKEN: ${YOUTRACK_TOKEN:-}
      YOUTRACK_STORY_POINTS_FIELD: ${YOUTRACK_STORY_POINTS_FIELD:-Story points}
