services:
  registry:
    image: registry:2
    container_name: ${REGISTRY_CONTAINER_NAME:-pocker-registry}
    restart: unless-stopped
    ports:
      - "${REGISTRY_BIND_ADDR:-127.0.0.1}:${REGISTRY_PORT:-5000}:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry

volumes:
  registry-data:
